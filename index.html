<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To my Kuchupuchuuu &#10084</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #f8f8fa;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, #e5e5e5 1px, transparent 1px),
                linear-gradient(to bottom, #e5e5e5 1px, transparent 1px);
        }

        .container {
            text-align: center;
        }

      
        .step {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .step.active {
            display: block;
        }

        /* Typography */
        h1 {
            color: #7d44a2;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Images / Gifs */
        img {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        /* Replicating the purple pill buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            background: linear-gradient(90deg, #9b51e0, #c06be6);
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease, background 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #8a3cdb, #b458de);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Smooth transition animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <h1>Chal Chikhni, Photo Bhej</h1>
            <img src="Contents/cat-gun.png" alt="Cat with gun">
            <div class="buttons">
                <button onclick="nextStep(4)">Ok</button>
                <button onclick="nextStep(2)">Noi</button>
            </div>
        </div>

        <div id="step2" class="step">
            <h1>Pleamse Qutie 🥺</h1>
            <img src="Contents/mochi-cat-crying.gif" alt="Crying cat">
            <div class="buttons">
                <button onclick="nextStep(3)">Thike yr</button>
            </div>
        </div>

        <div id="step3" class="step">
            <h1>Bhej Rahi Ho ?</h1>
            <img src="Contents/amifatcat-wow.gif" alt="Blushing cat">
            <div class="buttons">
                <button onclick="nextStep(4)">Hanji</button>
            </div>
        </div>

        <div id="step4" class="step">
            <h1>Thanks Zi</h1>
            <img src="Contents/smile-cony.gif" alt="Happy rabbit">
            <div class="buttons">
                <button onclick="nextStep(5)">I lob &#128151 u</button>
            </div>
        </div>

        <div id="step5" class="step">
            <img src="Contents/coney-rabbit-mocha-bear.gif" alt="Hugging with hearts" style="max-width: 250px;">
        </div>
    </div>

    <script>
        function nextStep(stepNumber) {
          
            const steps = document.querySelectorAll('.step');
            steps.forEach(step => step.classList.remove('active'));

            
            document.getElementById('step' + stepNumber).classList.add('active');
        }
    </script>

</body>
</html>
